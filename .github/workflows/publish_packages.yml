name: Publish Packages

run-name: Publish ${{ inputs.experimental && 'experimental' || 'stable' }} package from ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      experimental:
        description: "Publish with the experimental npm tag"
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-packages
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm-publish

    steps:
      - name: Require repository admin permissions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          permission="$(gh api repos/${{ github.repository }}/collaborators/${{ github.actor }}/permission --jq .permission 2>/dev/null || true)"

          if [ "${permission}" != "admin" ]; then
            echo "::error::Only repository admins can publish packages. ${{ github.actor }} has '${permission:-none}' permissions."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: "npm"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint

      - name: Build package artifacts
        run: npm run build

      - name: Resolve publish channel and version
        id: publish
        env:
          EXPERIMENTAL: ${{ inputs.experimental }}
        run: |
          VERSION="$(node -p "require('./target/pkg/xray16/package.json').version")"

          if [ "${EXPERIMENTAL}" = "true" ]; then
            TAG="experimental"

            if ! echo "${VERSION}" | grep -Eq -- '-experimental\.[0-9]+$'; then
              echo "::error::Experimental publish requires an -experimental.N version in src/package.json, got '${VERSION}'."
              exit 1
            fi
          else
            TAG="latest"

            if ! echo "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Stable publish requires a plain x.y.z version in src/package.json, got '${VERSION}'."
              exit 1
            fi
          fi

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Publishing ${VERSION} with npm tag '${TAG}'." >> "${GITHUB_STEP_SUMMARY}"

      - name: Verify package contents
        run: npm pack --dry-run ./target/pkg/xray16

      - name: Publish package to npm
        run: npm publish ./target/pkg/xray16 --tag "${{ steps.publish.outputs.tag }}"

      - name: Tag the published commit
        env:
          VERSION: ${{ steps.publish.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists; skipping."
            exit 0
          fi

          git tag -a "v${VERSION}" -m "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub release
        if: steps.publish.outputs.tag == 'latest'
        env:
          VERSION: ${{ steps.publish.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes
