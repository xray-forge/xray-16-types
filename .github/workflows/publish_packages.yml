name: publish-packages

run-name: Publish package from ${{ github.ref_name }}

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-packages
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm-publish

    steps:
      - name: Require repository admin permissions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          permission="$(gh api repos/${{ github.repository }}/collaborators/${{ github.actor }}/permission --jq .permission 2>/dev/null || true)"

          if [ "${permission}" != "admin" ]; then
            echo "::error::Only repository admins can publish packages. ${{ github.actor }} has '${permission:-none}' permissions."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build plugins
        run: npm run build:plugins

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance

      - name: Resolve published version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "${GITHUB_OUTPUT}"

      - name: Tag the published commit
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists; skipping."
            exit 0
          fi

          git tag -a "v${VERSION}" -m "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub release
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes
